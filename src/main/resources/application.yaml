spring:
  application:
    name: medibug

## Telemetry
management:
  otlp:
    metrics:
      export:
        enabled: false   # desactiva OTLP para evitar el crash por protobuf mientras alineas versiones
  influx:
    metrics:
      export:
        enabled: false   # opcional: evita intentos de conectar a Influx de Micrometer si no está arriba

## Logging
logging:
  level:
    root: INFO
    org.springframework: INFO
    org.springframework.boot.autoconfigure: INFO
    io.micrometer: DEBUG
    io.opentelemetry: DEBUG
    uni.csw.medibug: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{40} - %msg%n"

